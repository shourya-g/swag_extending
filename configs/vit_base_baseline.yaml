experiment_name: vit_base_cifar10_adamw

dataset:
  name: cifar10
  batch_size: 8
  num_workers: 2
  image_size: 224
  normalization: imagenet
  augment: true

model:
  name: vit_base_patch16_224
  num_classes: 10
  pretrained: true

training:
  optimizer: adamw
  lr: 0.00002
  weight_decay: 0.05
  betas: [0.9, 0.999]
  epochs: 5

output:
  checkpoint_dir: outputs/checkpoints
  metrics_dir: outputs/metrics
  figures_dir: outputs/figures