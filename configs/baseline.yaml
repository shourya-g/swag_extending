experiment_name: resnet18_cifar10_sgd

dataset:
  name: cifar10
  batch_size: 128
  num_workers: 2

model:
  name: resnet18
  num_classes: 10

training:
  optimizer: sgd
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  epochs: 2

output:
  checkpoint_dir: outputs/checkpoints
  metrics_dir: outputs/metrics
  figures_dir: outputs/figures