experiment_name: resnet18_cifar10_5class_swag

dataset:
  name: cifar10
  batch_size: 128
  num_workers: 2
  train_classes: [0, 1, 2, 3, 4]
  test_classes: [0, 1, 2, 3, 4]

model:
  name: resnet18
  num_classes: 5

training:
  optimizer: sgd
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  epochs: 140

swa:
  start_epoch: 10
  save_freq: 1

swag:
  max_rank: 20
  num_samples: 50
  var_clamp: 0.0000001

input:
  baseline_checkpoint: outputs/checkpoints/resnet18_cifar10_5class_sgd.pt

output:
  checkpoint_dir: outputs/checkpoints
  metrics_dir: outputs/metrics
  figures_dir: outputs/figures

ood:
  id_classes: [0, 1, 2, 3, 4]
  ood_classes: [5, 6, 7, 8, 9]